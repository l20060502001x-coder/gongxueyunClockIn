name: 工学云自动打卡

on:
  schedule:
    # 北京时间 6:30 和 16:30 执行（UTC 时间 = 北京时间 - 8 小时）
    - cron: '30 22 * * *'  # 北京时间 8:30
    - cron: '30 8 * * *'   # 北京时间 18:00
  workflow_dispatch:       # 支持手动触发

jobs:
  clock-in:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行打卡
        env:
          USERS: ${{ secrets.USERS }}
        run: python clockIn.py
